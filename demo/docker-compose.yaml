version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: postgres-projectvvv

    environment:
      POSTGRES_DB: projectvvv
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456

    ports:
      - "5432:5432"

  app:
    build: .
    container_name: spring-projectvvv

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/projectvvv
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: 123456
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Consultar Tickets</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>

<div class="app-shell">

    <div th:replace="~{fragments/sidebar :: sidebar('tickets')}"></div>

    <main class="app-main">

        <div class="page-header">
            <h1>Tickets Emitidos</h1>
        </div>

        <div class="card">

            <div class="card-body">

                <table class="table">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Código</th>
                        <th>Tipo</th>
                        <th>Reserva</th>
                        <th>Cliente</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="ticket : ${tickets}">

                        <td th:text="${ticket.id}"></td>

                        <td th:text="${ticket.codigoTicket}"></td>

                        <td th:text="${ticket.tipoPassagem}"></td>

                        <td th:text="${ticket.idReserva}"></td>

                        <td th:text="${ticket.idCliente}"></td>

                        <td>

                            <a class="btn btn-primary btn-sm"
                               th:href="@{/tickets/detalhe/{id}(id=${ticket.id})}">
                                Visualizar
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(tickets)}">
                        <td colspan="6">
                            Nenhum ticket encontrado.
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

</body>
</html>

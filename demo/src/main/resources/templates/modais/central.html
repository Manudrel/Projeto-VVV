<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Central de Modais — SCVP | VVV</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/modais.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
</head>

<body>
<div class="sidebar-backdrop"></div>
<div class="app-shell">

    <!-- sidebar igual ao seu original, omitida por brevidade -->

    <div th:replace="~{fragments/sidebar :: sidebar('nova-reserva')}"></div>

    <main class="app-main">
        <div class="page-header">
            <nav class="breadcrumb" aria-label="Trilha">
                <a th:href="@{/dashboard}">Início</a>
                <span aria-hidden="true">›</span>
                <span>Modais</span>
            </nav>
            <h1>Central de Modais</h1>
        </div>

        <!-- Flash messages -->
        <div th:if="${mensagem}"
             th:class="'alert alert-' + ${tipoMensagem}"
             th:text="${mensagem}">
        </div>

        <div class="flex-between mb-4">
            <p class="text-muted mb-0">Frota multimodal cadastrada na rede VVV.</p>
            <button class="btn btn-primary"
                    data-dialog-open="#dialog-registrar-modal">+ Registrar Modal</button>
        </div>

        <!-- Tabela de modais -->
        <div class="table-wrapper mb-6">
            <table class="table">
                <thead>
                <tr>
                    <th>Código</th>
                    <th>Tipo</th>
                    <th>Modelo</th>
                    <th>Ano</th>
                    <th>Capacidade</th>
                    <th>Transportadora</th>
                    <th>Estado</th>
                    <th class="text-right">Ações</th>
                </tr>
                </thead>
                <tbody>
                <!-- Linha vazia quando não há modais -->
                <tr th:if="${#lists.isEmpty(modais)}">
                    <td colspan="8" class="text-center text-muted">
                        Nenhum modal cadastrado ainda.
                    </td>
                </tr>

                <tr th:each="m : ${modais}">
                    <td><code th:text="${m.codigoModal}">—</code></td>
                    <td th:text="${m.tipoModal}">—</td>
                    <td th:text="${m.modelo}">—</td>
                    <td th:text="${m.ano}">—</td>
                    <td th:text="${m.capacidade}">—</td>
                    <td th:text="${m.idTrasnportadora}">—</td>
                    <td>
                            <span th:class="${m.estadoModal.name() == 'ATIVO' ? 'badge badge-success' :
                                m.estadoModal.name() == 'MANUTENCAO' ? 'badge badge-warning' :
                                'badge badge-neutral'}"
                                  th:text="${m.estadoModal}">
                                </span>
                    </td>
                    <td class="actions">
                        <!-- Botão abre dialog de mudança de estado -->
                        <button class="btn btn-secondary btn-sm"
                                th:data-dialog-open="'#dialog-estado-' + ${m.id}">
                            Atualizar estado
                        </button>

                        <!-- Dialog inline de estado por modal -->
                        <div th:id="'dialog-estado-' + ${m.id}" class="dialog-backdrop">
                            <div class="dialog-container" style="max-width:400px">
                                <button type="button" class="dialog-close-btn"
                                        data-dialog-close>&times;</button>
                                <h2 class="card-title" style="margin-bottom:16px">
                                    Atualizar estado —
                                    <code th:text="${m.codigoModal}"></code>
                                </h2>
                                <form method="post"
                                      th:action="@{/modais/{id}/estado(id=${m.id})}">
                                    <div class="form-group">
                                        <label class="form-label" for="estado">Novo estado</label>
                                        <select id="estado" name="estado" class="form-control"
                                                data-toggle-target="#desc-manut"
                                                data-toggle-value="MANUTENCAO">
                                            <option th:each="e : ${estadosModal}"
                                                    th:value="${e}"
                                                    th:text="${e}"
                                                    th:selected="${e == m.estadoModal}">
                                            </option>
                                        </select>
                                    </div>
                                    <div id="desc-manut" class="form-group hidden">
                                        <label class="form-label" for="descricao">
                                            Descrição da manutenção
                                        </label>
                                        <input id="descricao" name="descricao"
                                               class="form-control"
                                               placeholder="Ex: troca de pneus" />
                                    </div>
                                    <div class="btn-group mt-4"
                                         style="display:flex;justify-content:flex-end;gap:10px">
                                        <button type="button" class="btn btn-secondary"
                                                data-dialog-close>Cancelar</button>
                                        <button type="submit" class="btn btn-primary">
                                            Salvar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Dialog: Registrar novo modal -->
<div id="dialog-registrar-modal" class="dialog-backdrop">
    <div class="dialog-container">
        <button type="button" class="dialog-close-btn"
                data-dialog-close aria-label="Fechar">&times;</button>

        <div class="card-header" style="margin-bottom:20px">
            <h2 class="card-title" style="margin:0">Registrar modal</h2>
        </div>

        <div class="card-body">
            <form method="post" th:action="@{/modais}"
                  th:object="${modalDTO}" novalidate>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="tipo">
                            Tipo <span class="required">*</span>
                        </label>
                        <select id="tipo" th:field="*{tipoModal}"
                                class="form-control" required>
                            <option value="">Selecione...</option>
                            <option th:each="t : ${tiposModal}"
                                    th:value="${t}"
                                    th:text="${t}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="modelo">
                            Modelo <span class="required">*</span>
                        </label>
                        <input id="modelo" th:field="*{modelo}"
                               class="form-control" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="ano">
                            Ano <span class="required">*</span>
                        </label>
                        <input id="ano" th:field="*{ano}"
                               type="number" min="1950" max="2030"
                               class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="capacidade">
                            Capacidade <span class="required">*</span>
                        </label>
                        <input id="capacidade" th:field="*{capacidade}"
                               type="number" min="1"
                               class="form-control" required />
                    </div>
                </div>

                <!-- Select de transportadora vindo do banco -->
                <div class="form-group">
                    <label class="form-label" for="transp">
                        Transportadora <span class="required">*</span>
                    </label>
                    <select id="transp" th:field="*{transportadoraId}"
                            class="form-control" required>
                        <option value="">Selecione...</option>
                        <option th:each="t : ${transportadoras}"
                                th:value="${t.codigoTransportadora}"
                                th:text="${t.nome}">
                        </option>
                    </select>
                </div>

                <div class="btn-group mt-4"
                     style="display:flex;justify-content:flex-end;gap:10px">
                    <button type="button" class="btn btn-secondary"
                            data-dialog-close>Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        Registrar modal
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>

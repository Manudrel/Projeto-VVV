<div th:replace="~{fragments/sidebar :: sidebar('nova-reserva')}"></div>

<header class="app-header">
  <div class="header-left">
    <button class="menu-toggle" data-menu-toggle aria-label="Abrir menu">☰</button>
    <h1 class="page-title">Nova Reserva</h1>
  </div>
  <div class="user-menu">
    <div class="user-info">
      <span class="user-name">Maria Souza</span>
      <span class="user-role">Gerente</span>
    </div>
    <span class="user-avatar">M</span>
    <form method="post" action="/logout" style="margin:0;">
      <button type="submit" class="btn btn-ghost btn-sm" title="Sair">Sair</button>
    </form>
  </div>
</header>

<main class="app-main">
  <div class="page-header">
    <nav class="breadcrumb" aria-label="Trilha">
      <a th:href="@{/dashboard}" href="/dashboard">Início</a>
      <span aria-hidden='true'>›</span>
      <a th:href="@{/reservas}" href="/reservas">Reservas</a>
      <span aria-hidden='true'>›</span>
      <span>Nova</span>
    </nav>
    <h1>Nova Reserva</h1>
  </div>

  <div class="card">
    <div class="card-body">

      <ol class="wizard-steps" role="tablist">
        <li class="wizard-step done"><span class="num">1</span> Dados</li>
        <li class="wizard-step active"><span class="num">2</span> Rotas</li>
        <li class="wizard-step"><span class="num">3</span> Confirmação</li>
      </ol>

      <form method="post" action="/reservas/nova/rotas" id="form-rotas" novalidate>

        <h3>Origem e destino</h3>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="origem">Cidade de origem <span class="required">*</span></label>
            <select id="origem" name="origemId" class="form-control" required>
              <option th:each="cidade : ${cidades}" th:value="${cidade.id}"
                th:text="${cidade.cidade + ' — ' + cidade.estado + ' (' + cidade.codigoIata + ')'}">
              </option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="destino">Cidade de destino <span class="required">*</span></label>
            <select id="destino" name="destinoId" class="form-control" required>
              <option th:each="cidade : ${cidades}" th:value="${cidade.id}"
                th:text="${cidade.cidade + ' — ' + cidade.estado + ' (' + cidade.codigoIata + ')'}">
              </option>
            </select>
          </div>
        </div>

        <div class="form-group mt-4">
          <label class="form-label">Escalas (opcional)</label>
          <div id="escalas-lista"></div>
          <button type="button" class="btn btn-secondary btn-sm" id="btn-add-escala">+ Adicionar escala</button>
          <span class="form-hint">A ordem das escalas abaixo define a ordem dos trechos da viagem.</span>
        </div>

        <template id="escala-template">
          <div class="escala-row form-row" style="align-items:end;">
            <div class="form-group" style="flex:1;">
              <select name="escalaId" class="form-control">
                <option th:each="cidade : ${cidades}" th:value="${cidade.id}"
                  th:text="${cidade.cidade + ' — ' + cidade.estado + ' (' + cidade.codigoIata + ')'}">
                </option>
              </select>
            </div>
            <div class="form-group" style="flex:0;display:flex;gap:.25rem;">
              <button type="button" class="btn btn-secondary btn-sm" data-move-up title="Mover para cima">↑</button>
              <button type="button" class="btn btn-secondary btn-sm" data-move-down title="Mover para baixo">↓</button>
              <button type="button" class="btn btn-danger btn-sm" data-remove-escala title="Remover">✕</button>
            </div>
          </div>
        </template>

        <div class="wizard-nav mt-4">
          <a href="/reservas/nova" class="btn btn-secondary">← Voltar</a>
          <button type="submit" class="btn btn-primary">Próximo →</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script>
(function () {
  const lista = document.getElementById('escalas-lista');
  const template = document.getElementById('escala-template');
  const btnAdd = document.getElementById('btn-add-escala');

  btnAdd.addEventListener('click', function () {
    const clone = template.content.cloneNode(true);
    lista.appendChild(clone);
  });

  lista.addEventListener('click', function (e) {
    const row = e.target.closest('.escala-row');
    if (!row) return;

    if (e.target.hasAttribute('data-remove-escala')) {
      row.remove();
    }
    if (e.target.hasAttribute('data-move-up')) {
      const prev = row.previousElementSibling;
      if (prev) lista.insertBefore(row, prev);
    }
    if (e.target.hasAttribute('data-move-down')) {
      const next = row.nextElementSibling;
      if (next) lista.insertBefore(next, row);
    }
  });
})();
</script>

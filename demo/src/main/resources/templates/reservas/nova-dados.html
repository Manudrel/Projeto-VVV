<div th:replace="~{fragments/sidebar :: sidebar('nova-reserva')}"></div>

<header class="app-header">
    <div class="header-left">
        <button class="menu-toggle" data-menu-toggle aria-label="Abrir menu">☰</button>
        <h1 class="page-title">Nova Reserva</h1>
    </div>
    <div class="user-menu">
        <div class="user-info">
            <span class="user-name">Maria Souza</span>
            <span class="user-role">Gerente</span>
        </div>
        <span class="user-avatar">M</span>
        <form method="post" action="/logout" style="margin:0;">
            <button type="submit" class="btn btn-ghost btn-sm" title="Sair">Sair</button>
        </form>
    </div>
</header>

<main class="app-main">
    <div class="page-header">
        <nav class="breadcrumb" aria-label="Trilha">
            <a th:href="@{/dashboard}" href="/dashboard">Início</a>
            <span aria-hidden='true'>›</span>
            <a th:href="@{/reservas}" href="/reservas">Reservas</a>
            <span aria-hidden='true'>›</span>
            <span>Nova</span>
        </nav>
        <h1>Nova Reserva</h1>
    </div>

    <div class="card">
        <div class="card-body">

            <ol class="wizard-steps" role="tablist">
                <li class="wizard-step active"><span class="num">1</span> Dados</li>
                <li class="wizard-step"><span class="num">2</span> Rotas</li>
                <li class="wizard-step"><span class="num">3</span> Confirmação</li>
            </ol>

            <form method="post" action="/reservas/nova" novalidate>

                <h3>Dados da reserva</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="data">Data <span class="required">*</span></label>
                        <input id="data" name="data" type="date" class="form-control"
                               th:value="${dados.data}" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="horaPartida">Hora de partida <span class="required">*</span></label>
                        <input id="horaPartida" name="horaPartida" type="time" class="form-control"
                               th:value="${dados.horaPartida}" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="localizador">Localizador <span class="required">*</span></label>
                        <input id="localizador" name="localizador" type="text" class="form-control"
                               th:value="${dados.localizador}" maxlength="100" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="valor">Valor <span class="required">*</span></label>
                        <input id="valor" name="valor" type="number" step="0.01" min="0" class="form-control"
                               th:value="${dados.valor}" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="tipoViagem">Tipo de viagem <span class="required">*</span></label>
                        <select id="tipoViagem" name="tipoViagem" class="form-control" required>
                            <option th:each="tv : ${T(com.projectvvv.domain.model.TipoViagem).values()}"
                                    th:value="${tv}" th:text="${tv}"
                                    th:selected="${dados.tipoViagem == tv}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tipoModal">Tipo de modal <span class="required">*</span></label>
                        <select id="tipoModal" name="tipoModal" class="form-control" required>
                            <option th:each="tm : ${T(com.projectvvv.domain.model.TipoModal).values()}"
                                    th:value="${tm}" th:text="${tm}"
                                    th:selected="${dados.tipoModal == tm}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tipoPassagem">Tipo de passagem <span class="required">*</span></label>
                        <select id="tipoPassagem" name="tipoPassagem" class="form-control" required>
                            <option th:each="tp : ${T(com.projectvvv.domain.model.TipoPassagem).values()}"
                                    th:value="${tp}" th:text="${tp}"
                                    th:selected="${dados.tipoPassagem == tp}"></option>
                        </select>
                    </div>
                </div>

                <div class="wizard-nav mt-4">
                    <span></span>
                    <button type="submit" class="btn btn-primary">Próximo →</button>
                </div>
            </form>
        </div>
    </div>
</main>

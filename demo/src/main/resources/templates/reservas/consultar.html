<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar Reservas — SCVP | VVV</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}" href="/css/variables.css" />
  <link rel="stylesheet" th:href="@{/css/components.css}" href="/css/components.css" />
  <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
  <link rel="stylesheet" th:href="@{/css/sidebar.css}" href="/css/sidebar.css" />
</head>
<body>
<div class="sidebar-backdrop"></div>
<div class="app-shell">

  <div th:replace="~{fragments/sidebar :: sidebar('consultar')}"></div>

  <header class="app-header">
    <div class="header-left">
      <button class="menu-toggle" data-menu-toggle aria-label="Abrir menu">☰</button>
      <h1 class="page-title">Consultar Reservas</h1>
    </div>
    <div class="user-menu">
      <div class="user-info">
        <span class="user-name">Maria Souza</span>
        <span class="user-role">Gerente</span>
      </div>
      <span class="user-avatar">M</span>
      <form method="post" action="/logout" style="margin:0;">
        <button type="submit" class="btn btn-ghost btn-sm" title="Sair">Sair</button>
      </form>
    </div>
  </header>

  <main class="app-main">
    <div class="page-header">
      <nav class="breadcrumb" aria-label="Trilha">
        <a th:href="@{/dashboard}" href="/dashboard">Início</a>
        <span aria-hidden="true">›</span>
        <span>Reservas</span>
      </nav>
      <h1>Consultar Reservas</h1>
    </div>

    <!-- FILTROS -->
    <form class="filter-bar" method="get" th:action="@{/reservas/consultar}">
      <div class="form-group">
        <label class="form-label" for="f-status">Status</label>
        <select id="f-status" name="status" class="form-control">
          <option value="">Todos</option>
          <option value="PENDENTE"   th:selected="${param.status == 'PENDENTE'}">Pendente</option>
          <option value="CONCLUIDO" th:selected="${param.status == 'CONCLUIDO'}">Concluido</option>
          <option value="CANCELADA"  th:selected="${param.status == 'CANCELADA'}">Cancelada</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-de">De</label>
        <input id="f-de" type="date" name="de" class="form-control" th:value="${param.de}" />
      </div>
      <div class="form-group">
        <label class="form-label" for="f-ate">Até</label>
        <input id="f-ate" type="date" name="ate" class="form-control" th:value="${param.ate}" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary">Filtrar</button>
        <a th:href="@{/reservas/nova}" class="btn btn-accent">+ Nova reserva</a>
      </div>
    </form>

    <!-- TABELA -->
    <div class="table-wrapper">
      <table class="table">
        <thead>
        <tr>
          <th>Localizador</th>
          <th>Data</th>
          <th>Hora</th>
          <th>Tipo</th>
          <th>Valor</th>
          <th>Status</th>
          <th class="text-right">Ações</th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="r : ${reservas}">
          <td><code th:text="${r.localizador}">—</code></td>
          <td th:text="${r.data}">—</td>
          <td th:text="${r.horaPartida != null ? r.horaPartida : '—'}">—</td>
          <td>
            <span th:text="${r.tipoModal != null ? r.tipoModal : '—'}">—</span>
            <span> • </span>
            <span th:text="${r.tipoViagem != null ? r.tipoViagem : '—'}">—</span>
          </td>
          <td th:text="${r.valor != null ? 'R$ ' + #numbers.formatDecimal(r.valor, 1, 'POINT', 2, 'COMMA') : '—'}">—</td>

          <td>
                <span th:if="${r.statusReserva != null and r.statusReserva.name() == 'PENDENTE'}"
                      class="badge badge-warning">Pendente</span>
            <span th:if="${r.statusReserva != null and r.statusReserva.name() == 'CONFIRMADO'}"
                  class="badge badge-success">Confirmado</span>
            <span th:if="${r.statusReserva != null and r.statusReserva.name() == 'CANCELADA'}"
                  class="badge badge-danger">Cancelada</span>
          </td>

          <td class="actions">
            <a class="btn btn-ghost btn-sm"
               th:href="@{/reservas/detalhe/{codigoReserva}(codigoReserva=${r.codigoReserva})}">Detalhes</a>

            <form th:if="${r.statusReserva != null and r.statusReserva.name() == 'PENDENTE'}"
                  th:action="@{/reservas/{codigoReserva}/confirmar(codigoReserva=${r.codigoReserva})}"
                  method="post" style="display:inline;">
              <button type="submit" class="btn btn-secondary btn-sm">Confirmar</button>
            </form>

            <form th:if="${r.statusReserva != null and r.statusReserva.name() == 'PENDENTE'}"
                  th:action="@{/reservas/{codigoReserva}/cancelar(codigoReserva=${r.codigoReserva})}"
                  method="post" style="display:inline;">
              <button type="submit" class="btn btn-danger btn-sm">Cancelar</button>
            </form>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(reservas)}">
          <td colspan="7" class="text-center" style="padding:2rem;">
            Nenhuma reserva encontrada.
          </td>
        </tr>

        </tbody>
      </table>
    </div>

  </main>
</div>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>

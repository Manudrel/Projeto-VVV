<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pontos de Venda — SCVP | VVV</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <link rel="stylesheet" th:href="@{/css/app.css}" />
  <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
</head>
<body>
<div class="sidebar-backdrop"></div>
<div class="app-shell">

  <!-- SIDEBAR omitida, igual ao padrão do projeto -->

  <div th:replace="~{fragments/sidebar :: sidebar('nova-reserva')}"></div>

  <main class="app-main">
    <div class="page-header">
      <nav class="breadcrumb" aria-label="Trilha">
        <a th:href="@{/dashboard}">Início</a>
        <span aria-hidden="true">›</span>
        <span>Administração</span>
        <span aria-hidden="true">›</span>
        <span>Pontos de Venda</span>
      </nav>
      <h1>Pontos de Venda</h1>
    </div>

    <!-- Flash messages -->
    <div th:if="${mensagem}"
         th:class="'alert alert-' + ${tipoMensagem}"
         th:text="${mensagem}">
    </div>

    <!-- Formulário de cadastro -->
    <section class="card form-card mb-6">
      <div class="card-header">
        <h2 class="card-title">Cadastrar ponto de venda</h2>
      </div>
      <div class="card-body">
        <form method="post" th:action="@{/pontos-venda}"
              th:object="${pontoVendaDTO}" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="p-nome">
                Nome <span class="required">*</span>
              </label>
              <input id="p-nome" th:field="*{nome}"
                     class="form-control" required />
              <span class="form-error"
                    th:if="${#fields.hasErrors('nome')}"
                    th:errors="*{nome}">
              </span>
            </div>
            <div class="form-group">
              <label class="form-label" for="p-cnpj">
                CNPJ <span class="required">*</span>
              </label>
              <input id="p-cnpj" th:field="*{cnpj}"
                     class="form-control"
                     placeholder="00.000.000/0000-00" required />
              <span class="form-error"
                    th:if="${#fields.hasErrors('cnpj')}"
                    th:errors="*{cnpj}">
              </span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="p-tel">
                Telefone <span class="required">*</span>
              </label>
              <input id="p-tel" th:field="*{telefone}"
                     class="form-control" required />
              <span class="form-error"
                    th:if="${#fields.hasErrors('telefone')}"
                    th:errors="*{telefone}">
              </span>
            </div>
            <div class="form-group">
              <label class="form-label" for="p-end">
                Endereço <span class="required">*</span>
              </label>
              <input id="p-end" th:field="*{endereco}"
                     class="form-control" required />
              <span class="form-error"
                    th:if="${#fields.hasErrors('endereco')}"
                    th:errors="*{endereco}">
              </span>
            </div>
          </div>

          <div class="btn-group mt-4" style="justify-content:flex-end;">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Tabela de pontos cadastrados -->
    <div class="table-wrapper">
      <table class="table">
        <thead>
        <tr>
          <th>Nome</th>
          <th>CNPJ</th>
          <th>Telefone</th>
          <th>Endereço</th>
          <th class="text-right">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(pontosVenda)}">
          <td colspan="5" class="text-center text-muted">
            Nenhum ponto de venda cadastrado ainda.
          </td>
        </tr>
        <tr th:each="p : ${pontosVenda}">
          <td th:text="${p.nome}">—</td>
          <td th:text="${p.cnpj}">—</td>
          <td th:text="${p.telefone}">—</td>
          <td th:text="${p.endereco}">—</td>
          <td class="actions">
            <!-- Remover via POST (sem JS, compatível com Spring Security) -->
            <form method="post"
                  th:action="@{/pontos-venda/{id}/remover(id=${p.codigoPonto})}"
                  style="display:inline"
                  onsubmit="return confirm('Remover este ponto de venda?')">
              <button type="submit" class="btn btn-danger btn-sm">Remover</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
